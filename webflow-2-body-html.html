<style>
/* ── RESET ── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
section, .w-section { margin: 0 !important; padding: 0 !important; }
.w-embed { display: block; margin: 0; padding: 0; }

:root {
  --navy:  #0A0A1A;
  --teal:  #00D4AA;
  --teal-bright: #00FFD1;
  --blue:  #0066FF;
  --gold:  #FFB800;
  --white: #F5F5F7;
  --grey:  #6B6B7B;
}

html { scroll-behavior: auto; }
body {
  background: var(--navy) !important;
  color: var(--white);
  font-family: 'Inter', sans-serif;
  overflow-x: hidden;
}

/* ════════════════════════════════
   GLOBAL NAV
   ID: #nav
   ════════════════════════════════ */
#nav {
  position: fixed; top: 0; left: 0; right: 0; z-index: 200;
  display: flex; align-items: center; justify-content: space-between;
  padding: 24px 40px;
  opacity: 0; transition: opacity 1.8s ease;
  background: linear-gradient(to bottom, rgba(10,10,26,0.7), transparent);
}
#nav-logo {
  font-family: 'Space Grotesk', sans-serif;
  font-size: 18px; font-weight: 600;
  color: var(--white); letter-spacing: -0.02em;
  text-decoration: none;
}
#nav-logo span { color: var(--teal-bright); }
#nav-cta {
  font-family: 'Space Grotesk', sans-serif;
  font-size: 13px; font-weight: 500;
  color: var(--navy); background: var(--teal);
  border: none; padding: 10px 22px;
  border-radius: 4px; cursor: pointer;
  letter-spacing: 0.03em; transition: background 0.2s ease;
}
#nav-cta:hover { background: var(--teal-bright); }

/* ════════════════════════════════
   PROGRESS DOTS
   ID: #progress-dots
   ════════════════════════════════ */
#progress-dots {
  position: fixed; right: 28px; top: 50%;
  transform: translateY(-50%);
  display: flex; flex-direction: column; gap: 10px;
  z-index: 200; opacity: 0; transition: opacity 1s ease;
}
.dot {
  width: 6px; height: 6px; border-radius: 50%;
  background: rgba(245,245,247,0.25);
  cursor: pointer;
  transition: background 0.4s;
}
.dot.active { background: var(--teal); }

/* ════════════════════════════════
   SCENE 1: THE HOOK
   ID: #scene1
   ════════════════════════════════ */
#scene1 {
  height: 100vh; width: 100vw;
  position: relative; overflow: hidden;
  background: var(--navy);
}
canvas#c {
  display: block; position: absolute;
  top: 0; left: 0; width: 100%; height: 100%;
}
#overlay {
  position: absolute;
  top: 70px;
  left: 0; right: 0; bottom: 0;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  pointer-events: none; z-index: 10;
}
#text-group {
  display: flex; flex-direction: column; align-items: center;
  max-width: 840px; width: 100%; padding: 0 62px 0 32px;
}
/* Eyebrow */
#s3 {
  font-family: 'Space Grotesk', sans-serif;
  font-size: 11px; font-weight: 500;
  letter-spacing: 0.22em; color: var(--teal);
  text-transform: uppercase; white-space: nowrap;
  margin-bottom: 28px;
  opacity: 0; transform: translateY(10px);
  transition: opacity 0.9s ease, transform 0.9s ease;
}
#s3.show { opacity: 1; transform: translateY(0); }
/* Headline line 1 — words appear individually */
#s1 {
  font-family: 'Space Grotesk', sans-serif;
  font-size: clamp(1.8rem, 3.4vw, 3rem); font-weight: 700;
  color: var(--white); text-align: center; line-height: 1.2;
  text-shadow: 0 0 80px rgba(0,0,0,1), 0 0 40px rgba(0,0,0,0.9);
  margin-bottom: 0.15em;
}
.s1-word {
  display: inline-block;
  opacity: 0; transform: translateY(8px);
  transition: opacity 0.45s ease, transform 0.45s ease;
}
.s1-word.show { opacity: 1; transform: translateY(0); }
.s1-word.accent { color: var(--teal-bright); }
/* Headline line 2 — grows in */
#s2 {
  font-family: 'Space Grotesk', sans-serif;
  font-size: clamp(1.8rem, 3.4vw, 3rem); font-weight: 700;
  color: var(--white); text-align: center;
  line-height: 1.2; margin-bottom: 0.55em;
  text-shadow: 0 0 80px rgba(0,0,0,1), 0 0 40px rgba(0,0,0,0.9);
  opacity: 0; transform: scale(0.82);
  transition: opacity 0.55s cubic-bezier(0.16,1,0.3,1),
              transform 0.65s cubic-bezier(0.16,1,0.3,1);
}
#s2.show { opacity: 1; transform: scale(1); }
.s2-accent { color: var(--teal-bright); }
/* Sub copy */
#s4 {
  font-family: 'Inter', sans-serif;
  font-size: clamp(0.85rem, 1.4vw, 1rem); font-weight: 500;
  color: rgba(245,245,247,0.70); text-align: center;
  line-height: 1.85; margin-bottom: 0.9em;
  text-shadow: 0 0 60px rgba(0,0,0,1), 0 0 30px rgba(0,0,0,0.9);
}
.s4-line { display: block; opacity: 0; transition: opacity 0.8s ease; }
.s4-line.show { opacity: 1; }
/* Scroll indicator */
#scroll-indicator {
  position: fixed; bottom: 32px; left: 50%;
  transform: translateX(-50%);
  display: flex; flex-direction: column; align-items: center; gap: 8px;
  opacity: 0; z-index: 20; transition: opacity 1.6s ease;
}
#scroll-indicator span {
  font-family: 'Space Grotesk', sans-serif; font-size: 10px;
  letter-spacing: 0.2em; color: var(--teal); text-transform: uppercase;
}
.scroll-line {
  width: 1px; height: 40px;
  background: linear-gradient(to bottom, var(--teal), transparent);
  animation: scrollPulse 2s ease-in-out infinite;
}
@keyframes scrollPulse { 0%,100%{opacity:0.3} 50%{opacity:1} }

/* ════════════════════════════════
   SCENE 2: THE PROBLEM
   ════════════════════════════════ */
#scene2-wrapper { position: relative; margin: 0; padding: 0; display: block; }
#scene2 { position: relative; background: var(--navy); margin: 0; padding: 0; display: block; }
#scene2-sticky {
  position: sticky; top: 0; height: 100vh;
  overflow: hidden; display: flex;
  align-items: center; justify-content: center;
  perspective: 800px;
}
#messages-container {
  position: absolute; top: 0; left: 0; right: 0; bottom: 0;
  display: flex; align-items: center; justify-content: center;
  pointer-events: none;
}
.noise-layer { position: absolute; inset: 0; pointer-events: none; overflow: hidden; }
.noise-item {
  position: absolute;
  font-family: 'JetBrains Mono', monospace;
  white-space: nowrap; opacity: 0;
  transform-origin: center center;
  will-change: transform, opacity;
}
.problem-msg {
  position: absolute; text-align: center;
  opacity: 0; transform: translateZ(-600px) scale(0.1);
  will-change: transform, opacity;
  width: 90vw; max-width: 900px; pointer-events: none;
  background: radial-gradient(ellipse 20% 30% at 50% 50%,
    rgba(10,10,26,0.82) 0%, rgba(10,10,26,0.55) 55%, transparent 100%);
  padding: 2rem 3rem; border-radius: 12px;
}
.problem-msg .line {
  font-family: 'Space Grotesk', sans-serif;
  font-size: clamp(2.5rem, 7vw, 6rem);
  font-weight: 700; line-height: 1.05; display: block; color: var(--white);
  text-shadow: 0 0 60px rgba(0,0,0,1), 0 0 120px rgba(0,0,0,0.9), 0 2px 4px rgba(0,0,0,1);
}
.problem-msg .line.dim {
  color: var(--grey); font-weight: 300;
  text-shadow: 0 0 60px rgba(0,0,0,1), 0 0 120px rgba(0,0,0,0.9), 0 2px 4px rgba(0,0,0,1);
}
.problem-msg .line.highlight {
  color: var(--gold);
  text-shadow: 0 0 60px rgba(0,0,0,1), 0 0 120px rgba(0,0,0,0.9),
               0 0 30px rgba(255,184,0,0.5), 0 2px 4px rgba(0,0,0,1);
}

/* ════════════════════════════════
   SCENE 3: THE TRANSFORMATION
   ════════════════════════════════ */
#scene3-s1-wrapper { position: relative; margin: 0; padding: 0; display: block; }
#scene3-s1 { position: relative; background: var(--navy); margin: 0; padding: 0; display: block; }
#scene3-s1-sticky {
  position: sticky; top: 0; height: 100vh;
  overflow: hidden; display: flex;
  align-items: center; justify-content: center;
}
#transform-header {
  position: absolute; top: 1.25rem;
  left: 50%; transform: translateX(-50%);
  text-align: center; opacity: 0; z-index: 10;
  width: 92vw; max-width: 700px; white-space: normal;
}
.transform-eyebrow {
  font-family: 'Space Grotesk', sans-serif;
  font-size: 0.7rem; font-weight: 500;
  letter-spacing: 0.2em; text-transform: uppercase;
  color: var(--teal); margin-bottom: 0.4rem;
}
.transform-headline {
  font-family: 'Space Grotesk', sans-serif;
  font-size: clamp(1.1rem, 4vw, 2.5rem);
  font-weight: 700; letter-spacing: -0.02em; line-height: 1.2;
}
.transform-sub {
  font-family: 'Inter', sans-serif;
  font-size: clamp(0.8rem, 2vw, 1rem);
  color: var(--grey); font-weight: 300; margin-top: 0.25rem;
}
#morph-container {
  width: 94vw; max-width: 1050px;
  border-radius: 10px; overflow: hidden;
  border: 1px solid rgba(255,255,255,0.06);
  position: relative;
  height: calc(100vh - 140px); max-height: 600px;
  background: #0d0d1c;
}
#before-state {
  position: absolute; inset: 0;
  background: #fff;
  opacity: 1; overflow: hidden;
}
/* ── SCENE 3 SHOWCASE 1 — Excel before-state skin ── */
.xw{width:100%;height:100%;background:#fff;display:flex;flex-direction:column;overflow:hidden;font-family:'Segoe UI',Arial,sans-serif}
.xtb{height:26px;background:#217346;display:flex;align-items:center;justify-content:space-between;padding:0 8px;flex-shrink:0}
.xtb-fn{font-size:11px;color:#fff;font-weight:400;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.xtb-wc{display:flex;gap:1px}
.xtb-wc span{width:26px;height:22px;display:flex;align-items:center;justify-content:center;color:rgba(255,255,255,.85);font-size:13px;cursor:pointer;border-radius:2px}
.xrt{height:26px;background:#217346;display:flex;align-items:flex-end;padding:0 4px;flex-shrink:0}
.xrt-t{padding:3px 11px;font-size:11px;color:rgba(255,255,255,.8);cursor:pointer;border-radius:3px 3px 0 0}
.xrt-t.act{background:#fff;color:#217346;font-weight:600}
.xrc{height:54px;background:#fff;border-bottom:1px solid #ccc;display:flex;align-items:center;padding:2px 8px;gap:6px;flex-shrink:0;overflow:hidden}
.xfb{height:26px;background:#fff;border-bottom:1px solid #ccc;display:flex;align-items:center;flex-shrink:0}
.xnb{width:64px;height:100%;border-right:1px solid #ccc;display:flex;align-items:center;justify-content:center;font-size:11px;color:#333}
.xfx{font-size:12px;color:#888;padding:0 7px;font-style:italic}
.xfi{flex:1;font-size:11px;font-family:'Consolas','Courier New',monospace;color:#212121;padding:0 6px;white-space:nowrap;overflow:hidden}
.xgc{flex:1;overflow:hidden;display:flex;min-height:0}
.xgs{flex:1;overflow:hidden}
.xvs{width:14px;background:#f0f0f0;border-left:1px solid #ccc;display:flex;flex-direction:column;flex-shrink:0}
.xvs-a{height:14px;display:flex;align-items:center;justify-content:center;font-size:8px;color:#666;cursor:pointer}
.xvs-tr{flex:1;position:relative}
.xvs-th{position:absolute;top:12px;left:1px;right:1px;height:44px;background:#c0c0c0;border-radius:2px}
table.xg{border-collapse:collapse;table-layout:fixed;font-size:11px;font-family:'Calibri',Arial,sans-serif;color:#212121;width:100%}
table.xg th,table.xg td{border:1px solid #d9d9d9;height:20px;padding:0 3px;overflow:hidden;white-space:nowrap}
th.ch{background:#f2f2f2;text-align:center;font-weight:400;font-size:10px;color:#777;border:1px solid #d0d0d0}
th.ch.sel{background:#e3ede3;color:#217346}
td.rn{background:#f2f2f2;text-align:right;font-size:10px;color:#888;padding-right:5px;border:1px solid #d0d0d0}
td.rn.sel{background:#e3ede3;color:#217346}
td.sel-c{outline:2px solid #4472C4;outline-offset:-2px;position:relative;z-index:2}
td.yf{background:#FFFF00}
td.hdr{background:#f8f8f8;font-weight:700}
td.ra{text-align:right}
td.ca{text-align:center}
td.dim{color:#aaa}
td.red{color:#C00000}
td.st{text-decoration:line-through;color:#bbb}
td.mh{background:#f8f8f8;font-weight:700;font-size:11.5px;color:#212121;border-bottom:2px solid #217346}
td.tot{background:#f5f5f5;font-weight:700;border-top:2px solid #c8c8c8}
td.cmnt{position:relative}
td.cmnt::after{content:'';position:absolute;top:0;right:0;border-style:solid;border-width:0 7px 7px 0;border-color:transparent #C00000 transparent transparent}
td.eflag{position:relative}
td.eflag::before{content:'';position:absolute;top:0;left:0;border-style:solid;border-width:7px 7px 0 0;border-color:#00B050 transparent transparent transparent}
.xsta{height:26px;background:#f0f0f0;border-top:1px solid #ccc;display:flex;align-items:flex-end;flex-shrink:0;overflow:hidden}
.xsta-nav{display:flex;align-items:center;padding:2px 4px;gap:1px;border-right:1px solid #ccc}
.xsta-nav span{width:14px;height:14px;display:flex;align-items:center;justify-content:center;font-size:7px;color:#777;border:1px solid #ccc;background:#fff;cursor:pointer}
.xstab{padding:3px 10px;border:1px solid #c0c0c0;border-bottom:none;background:#e0e0e0;font-size:10px;color:#555;cursor:pointer;white-space:nowrap;margin-right:1px;border-radius:2px 2px 0 0}
.xstab.act{background:#fff;color:#217346;font-weight:700;border-bottom:1px solid #fff;margin-bottom:-1px}
.xstab.err{color:#C00000}
.xsb{height:20px;background:#217346;display:flex;align-items:center;padding:0 8px;justify-content:space-between;flex-shrink:0}
.xsb-l,.xsb-r{font-size:10px;color:rgba(255,255,255,.9);display:flex;align-items:center;gap:10px}
#after-state {
  position: absolute; inset: 0;
  background: #0d1117; padding: 1rem;
  opacity: 0; overflow-y: auto; overflow-x: hidden;
}
.board-header {
  display: flex; justify-content: space-between; align-items: flex-start;
  margin-bottom: 1rem; padding-bottom: 0.75rem;
  border-bottom: 1px solid rgba(0,212,170,0.15); gap: 0.5rem;
}
.board-title-block .company {
  font-family: 'Space Grotesk', sans-serif; font-size: 0.6rem;
  letter-spacing: 0.12em; text-transform: uppercase;
  color: var(--teal); margin-bottom: 0.25rem;
}
.board-title-block h2 {
  font-family: 'Space Grotesk', sans-serif;
  font-size: clamp(0.9rem, 2.5vw, 1.25rem); font-weight: 700; color: var(--white);
}
.board-title-block .period { font-size: 0.75rem; color: var(--grey); margin-top: 0.1rem; }
.board-ai-badge {
  display: flex; align-items: center; gap: 5px;
  background: rgba(0,212,170,0.1); border: 1px solid rgba(0,212,170,0.2);
  border-radius: 4px; padding: 4px 8px; flex-shrink: 0;
  font-family: 'Space Grotesk', sans-serif;
  font-size: 0.6rem; color: var(--teal); letter-spacing: 0.05em;
}
.ai-pulse {
  width: 5px; height: 5px; border-radius: 50%;
  background: var(--teal); animation: pulse 2s ease-in-out infinite;
}
@keyframes pulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:0.4;transform:scale(0.7)} }
.metrics-row { display: grid; grid-template-columns: repeat(4,1fr); gap: 8px; margin-bottom: 0.75rem; }
.metric-card {
  background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.06);
  border-radius: 6px; padding: 0.65rem; opacity: 0; transform: translateY(12px);
}
.metric-label {
  font-family: 'Inter', sans-serif; font-size: 0.6rem; color: var(--grey);
  margin-bottom: 0.3rem; text-transform: uppercase; letter-spacing: 0.08em;
}
.metric-value { font-family: 'Space Grotesk', sans-serif; font-size: clamp(1rem,2.5vw,1.4rem); font-weight: 700; color: var(--white); }
.metric-delta { font-family: 'Inter', sans-serif; font-size: 0.65rem; margin-top: 0.15rem; }
.delta-up   { color: var(--teal); }
.delta-warn { color: var(--gold); }
.delta-down { color: #FF4455; }
.charts-row { display: grid; grid-template-columns: 2fr 1fr; gap: 8px; margin-bottom: 0.75rem; }
.chart-card {
  background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.06);
  border-radius: 6px; padding: 0.75rem; opacity: 0;
}
.chart-card-title {
  font-family: 'Space Grotesk', sans-serif; font-size: 0.65rem; color: var(--grey);
  margin-bottom: 0.6rem; text-transform: uppercase; letter-spacing: 0.08em;
}
.bar-chart { display: flex; align-items: flex-end; gap: 3px; height: 75px; }
.bar-wrap { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 3px; height: 100%; justify-content: flex-end; }
.bar { width: 100%; border-radius: 2px 2px 0 0; height: 0; transition: height 1.2s cubic-bezier(0.16,1,0.3,1); }
.bar-label { font-family: 'JetBrains Mono', monospace; font-size: clamp(0.35rem,1vw,0.5rem); color: var(--grey); }
.donut-wrap { display: flex; gap: 8px; align-items: center; margin-top: 4px; }
.donut-legend { display: flex; flex-direction: column; gap: 4px; }
.legend-item { display: flex; align-items: center; gap: 5px; font-family: 'Inter', sans-serif; font-size: 0.58rem; color: var(--grey); }
.legend-dot { width: 5px; height: 5px; border-radius: 50%; flex-shrink: 0; }
.ai-insight {
  background: rgba(0,212,170,0.05); border: 1px solid rgba(0,212,170,0.18);
  border-left: 3px solid var(--teal); border-radius: 6px;
  padding: 0.7rem 0.85rem; opacity: 0; transform: translateX(-12px);
}
.ai-insight-label {
  font-family: 'Space Grotesk', sans-serif; font-size: 0.58rem;
  letter-spacing: 0.12em; text-transform: uppercase; color: var(--teal); margin-bottom: 0.35rem;
}
.ai-insight p { font-family: 'Inter', sans-serif; font-size: clamp(0.7rem,1.8vw,0.82rem); color: var(--white); line-height: 1.5; font-weight: 300; }
.ai-insight p strong { color: var(--teal); font-weight: 500; }
.transition-overlay {
  position: absolute; inset: 0; background: rgba(0,212,170,0.0);
  z-index: 5; pointer-events: none; opacity: 0; border-radius: 10px;
}

/* ════════════════════════════════
   SCENE 3 — SHOWCASE STUBS (2–5)
   ════════════════════════════════ */
.showcase-stub-wrapper {
  background: var(--navy);
  padding: 0;
  margin: 0;
}
.showcase-stub {
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  border-top: 1px solid rgba(255,255,255,0.04);
}
.showcase-stub-inner {
  max-width: 800px;
  width: 90%;
  text-align: center;
  opacity: 0;

}
.showcase-stub-inner.visible {
  opacity: 1;
  transform: translateY(0);
}
.showcase-stub-num {
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.7rem;
  color: rgba(107,107,123,0.4);

  margin-bottom: 1rem;
}
.showcase-stub-eyebrow {
  font-family: 'Space Grotesk', sans-serif;
  font-size: 0.72rem;
  font-weight: 500;
  letter-spacing: 0.22em;
  text-transform: uppercase;
  color: var(--teal);
  margin-bottom: 1.25rem;
}
.showcase-stub-headline {
  font-family: 'Space Grotesk', sans-serif;
  font-size: clamp(1.8rem, 4vw, 3rem);
  font-weight: 700;
  letter-spacing: -0.02em;
  line-height: 1.15;
  color: var(--white);
  margin-bottom: 1rem;
}
.showcase-stub-sub {
  font-family: 'Inter', sans-serif;
  font-size: clamp(0.9rem, 1.6vw, 1.05rem);
  font-weight: 300;
  color: var(--grey);
  line-height: 1.7;
  margin-bottom: 3rem;
}
.showcase-stub-placeholder {
  border: 1px dashed rgba(107,107,123,0.2);
  border-radius: 8px;
  padding: 3rem 2rem;
  color: rgba(107,107,123,0.35);
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.7rem;
  letter-spacing: 0.1em;
}

/* ════════════════════════════════
   SCENE 3 — SHOWCASE 2: SALES PIPELINE
   ID: #scene3-s2-wrapper
   ════════════════════════════════ */
#scene3-s2-wrapper { position: relative; margin: 0; padding: 0; display: block; }
#scene3-s2 { position: relative; background: var(--navy); margin: 0; padding: 0; display: block; }
#scene3-s2-sticky {
  position: sticky; top: 0; height: 100vh;
  overflow: hidden; background: var(--navy);
}
#s2-transform-header {
  position: absolute; top: 1.25rem;
  left: 50%; transform: translateX(-50%);
  text-align: center; opacity: 0; z-index: 10;
  width: 92vw; max-width: 700px; white-space: normal;
  background: linear-gradient(to bottom, var(--navy) 70%, transparent);
  padding-bottom: 0.75rem;
}
.s2-eyebrow {
  font-family: 'Space Grotesk', sans-serif;
  font-size: 0.7rem; font-weight: 500;
  letter-spacing: 0.2em; text-transform: uppercase;
  color: var(--teal); margin-bottom: 0.4rem;
}
.s2-headline {
  font-family: 'Space Grotesk', sans-serif;
  font-size: clamp(1.1rem, 4vw, 2.5rem);
  font-weight: 700; letter-spacing: -0.02em; line-height: 1.2; color: var(--white);
}
.s2-sub {
  font-family: 'Inter', sans-serif;
  font-size: clamp(0.8rem, 2vw, 1rem);
  color: var(--grey); font-weight: 300; margin-top: 0.25rem;
}
#s2-dashboard-track {
  position: absolute;
  left: 50%; transform: translateX(-50%);
  width: 94vw; max-width: 1050px;
  will-change: transform;
}
#s2-dashboard-card {
  width: 100%; border-radius: 10px;
  border: 1px solid rgba(255,255,255,0.06);
  background: #0d1117; padding: 1rem;
  display: flex; flex-direction: column; gap: 0.75rem;
  opacity: 0;
}
.s2-board-header {
  display: flex; justify-content: space-between; align-items: flex-start;
  padding-bottom: 0.75rem; border-bottom: 1px solid rgba(0,212,170,0.15);
  gap: 0.5rem; opacity: 0; transform: translateY(12px);
}
.s2-board-title-block .s2-company {
  font-family: 'Space Grotesk', sans-serif; font-size: 0.6rem;
  letter-spacing: 0.12em; text-transform: uppercase;
  color: var(--teal); margin-bottom: 0.25rem;
}
.s2-board-title-block h3 {
  font-family: 'Space Grotesk', sans-serif;
  font-size: clamp(0.9rem, 2.5vw, 1.25rem); font-weight: 700; color: var(--white);
}
.s2-board-title-block .s2-period { font-size: 0.75rem; color: var(--grey); margin-top: 0.1rem; }
.s2-metrics-row { display: grid; grid-template-columns: repeat(4,1fr); gap: 8px; }
#scene3-s2-wrapper .metric-card { opacity: 0; transform: translateY(12px); }
#s2-funnel-card {
  background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.06);
  border-radius: 6px; padding: 0.75rem; opacity: 0; transform: translateY(12px);
}
.funnel-track { display: flex; gap: 3px; align-items: stretch; height: 32px; }
.funnel-stage {
  display: flex; align-items: center; justify-content: center;
  border-radius: 3px; width: 0; overflow: hidden; white-space: nowrap; position: relative;
}
.funnel-stage-label {
  font-family: 'Inter', sans-serif; font-size: 0.55rem; font-weight: 500;
  color: rgba(0,0,0,0.75); letter-spacing: 0.05em;
  position: absolute; pointer-events: none;
  opacity: 0; transition: opacity 0.4s ease 0.8s;
}
.funnel-stage.visible .funnel-stage-label { opacity: 1; }
.funnel-meta { display: flex; justify-content: space-between; margin-top: 0.6rem; }
.funnel-meta-item { display: flex; flex-direction: column; align-items: center; gap: 0.15rem; }
.funnel-meta-count { font-family: 'Space Grotesk', sans-serif; font-size: 0.75rem; font-weight: 600; color: var(--white); }
.funnel-meta-name  { font-family: 'Inter', sans-serif; font-size: 0.5rem; color: rgba(245,245,247,0.35); letter-spacing: 0.08em; text-transform: uppercase; }
.s2-charts-row { display: grid; grid-template-columns: 2fr 3fr; gap: 8px; }
#scene3-s2-wrapper .chart-card { opacity: 0; display: flex; flex-direction: column; }
#scene3-s2-wrapper .bar-chart { height: 75px; margin-top: 0.4rem; }
.deal-table { width: 100%; border-collapse: collapse; margin-top: 0.4rem; }
.deal-table thead tr { border-bottom: 1px solid rgba(255,255,255,0.07); }
.deal-table thead th {
  font-family: 'Inter', sans-serif; font-size: 0.5rem; font-weight: 500;
  letter-spacing: 0.1em; text-transform: uppercase; color: rgba(245,245,247,0.3);
  padding: 0 0.5rem 0.5rem 0; text-align: left; white-space: nowrap;
}
.deal-table tbody tr { border-bottom: 1px solid rgba(255,255,255,0.04); opacity: 0; transform: translateX(-12px); }
.deal-table tbody tr.hot-deal { background: rgba(0,212,170,0.05); border-left: 2px solid var(--teal); }
.deal-table tbody td { font-family: 'Inter', sans-serif; font-size: 0.6rem; color: rgba(245,245,247,0.75); padding: 0.45rem 0.5rem 0.45rem 0; white-space: nowrap; }
.deal-table tbody tr.hot-deal td { color: rgba(245,245,247,0.92); }
.deal-value { font-family: 'JetBrains Mono', monospace; font-size: 0.6rem; color: var(--white) !important; font-weight: 500; }
.deal-stage-pill { display: inline-block; padding: 0.1rem 0.45rem; border-radius: 10px; font-size: 0.5rem; font-weight: 500; letter-spacing: 0.05em; }
.stage-negotiation { background: rgba(0,212,170,0.15); color: var(--teal); }
.stage-proposal    { background: rgba(0,102,255,0.15); color: #6699ff; }
.stage-qualified   { background: rgba(255,184,0,0.15);  color: var(--gold); }
.deal-prob { font-family: 'JetBrains Mono', monospace; font-size: 0.55rem; }
.prob-high { color: var(--teal); }
.prob-mid  { color: var(--gold); }
.prob-low  { color: rgba(245,245,247,0.4); }
.hot-badge { font-family: 'JetBrains Mono', monospace; font-size: 0.45rem; color: var(--teal); letter-spacing: 0.1em; text-transform: uppercase; margin-left: 0.3rem; }
#s2-ai-insight { opacity: 0; transform: translateX(-12px); }

/* ── S2 Mobile ── */
@media (max-width: 768px) {
  .s2-metrics-row { grid-template-columns: repeat(2,1fr); }
  .s2-charts-row  { grid-template-columns: 1fr; }
}
@media (max-width: 600px) {
  #s2-transform-header { top: 1rem; }
  .funnel-stage-label  { display: none; }
  .deal-table thead th:nth-child(3), .deal-table tbody td:nth-child(3),
  .deal-table thead th:nth-child(4), .deal-table tbody td:nth-child(4) { display: none; }
}
@media (max-width: 420px) {
  .s2-headline { font-size: clamp(1.5rem, 7vw, 2rem); }
}

/* ════════════════════════════════
   SHOWCASE 3 — BUSINESS RISK
   ════════════════════════════════ */

#scene3-s3-wrapper {
  position: relative;
  margin: 0;
  padding: 0;
  display: block;
  background: var(--navy);
}

#scene3-s3 {
  height: 250vh;
  position: relative;
}
#scene3-s3-sticky {
  position: sticky;
  top: 0;
  height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 5vh 5vw;
  overflow: hidden;
}

.risk-content {
  width: 100%;
  max-width: 1240px;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: clamp(1.25rem, 2.5vh, 2rem);
}

/* ── Header ── */
.risk-header {
  text-align: center;
  max-width: 640px;
}
.showcase-stub-num {
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.7rem;
  color: rgba(107,107,123,0.4);
  letter-spacing: 0.2em;
  margin-bottom: 0.6rem;
}
.risk-eyebrow {
  font-family: 'Space Grotesk', sans-serif;
  font-size: 0.72rem;
  font-weight: 500;
  letter-spacing: 0.22em;
  text-transform: uppercase;
  color: var(--teal);
  margin-bottom: 0.75rem;
}
.risk-headline {
  font-family: 'Space Grotesk', sans-serif;
  font-size: clamp(1.5rem, 3.2vw, 2.4rem);
  font-weight: 700;
  letter-spacing: -0.02em;
  line-height: 1.15;
  color: var(--white);
  margin-bottom: 0.6rem;
}
.risk-sub {
  font-family: 'Inter', sans-serif;
  font-size: clamp(0.85rem, 1.4vw, 1rem);
  font-weight: 300;
  color: var(--grey);
  line-height: 1.6;
}

/* ── Dashboard grid ── */
.risk-dashboard {
  width: 100%;
  display: grid;
  grid-template-columns: 1.25fr 1fr;
  gap: 24px;
}

.risk-card {
  background: rgba(255,255,255,0.03);
  border: 1px solid rgba(255,255,255,0.06);
  border-radius: 8px;
  padding: clamp(1rem, 1.8vh, 1.5rem);
}

.risk-card-label {
  font-family: 'Space Grotesk', sans-serif;
  font-size: 0.7rem;
  font-weight: 500;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: var(--grey);
  margin-bottom: 1rem;
}

/* ── Risk matrix ── */
.risk-matrix-wrap {
  display: flex;
  gap: 10px;
}
.risk-matrix-axis-y {
  display: flex;
  flex-direction: column;
  justify-content: space-between;
  align-items: flex-end;
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.6rem;
  color: var(--grey);
  letter-spacing: 0.05em;
  padding: 2px 0;
  text-align: right;
}
.risk-matrix-axis-y span:first-child { writing-mode: initial; }
.risk-matrix-main {
  flex: 1;
  display: flex;
  flex-direction: column;
  gap: 8px;
}
.risk-matrix {
  position: relative;
  width: 100%;
  aspect-ratio: 5 / 4;
}
.risk-matrix-grid {
  position: absolute;
  inset: 0;
  display: grid;
  grid-template-columns: repeat(5, 1fr);
  grid-template-rows: repeat(5, 1fr);
  gap: 3px;
}
.risk-matrix-cell {
  border-radius: 4px;
  border: 1px solid transparent;
}
.cell-b1 { background: rgba(0,212,170,0.05); border-color: rgba(0,212,170,0.12); }
.cell-b2 { background: rgba(0,212,170,0.13); border-color: rgba(0,212,170,0.22); }
.cell-b3 { background: rgba(255,184,0,0.14); border-color: rgba(255,184,0,0.26); }
.cell-b4 { background: rgba(255,184,0,0.27); border-color: rgba(255,184,0,0.42); }
.cell-b5 { background: rgba(255,68,85,0.24); border-color: rgba(255,68,85,0.42); }

.risk-matrix-axis-x {
  display: flex;
  justify-content: space-between;
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.6rem;
  color: var(--grey);
  letter-spacing: 0.05em;
  padding: 0 2px;
}
.risk-matrix-axis-label {
  font-family: 'Space Grotesk', sans-serif;
  font-size: 0.6rem;
  font-weight: 500;
  letter-spacing: 0.16em;
  text-transform: uppercase;
  color: rgba(107,107,123,0.6);
}
.risk-matrix-axis-label.axis-impact {
  text-align: center;
  margin-top: 4px;
}
.risk-matrix-axis-label.axis-likelihood {
  writing-mode: vertical-rl;
  transform: rotate(180deg);
  text-align: center;
  align-self: center;
  margin-bottom: 6px;
}

/* ── Risk dots ── */
.risk-dot {
  position: absolute;
  width: 14px;
  height: 14px;
  border-radius: 50%;
  transform: translate(-50%, -50%);
  border: 2px solid var(--navy);
  cursor: default;
  box-shadow: 0 0 0 0 rgba(0,0,0,0);
}
.risk-dot::after {
  content: attr(data-label);
  position: absolute;
  bottom: calc(100% + 8px);
  left: 50%;
  transform: translateX(-50%);
  background: #14141f;
  border: 1px solid rgba(255,255,255,0.08);
  color: var(--white);
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.6rem;
  letter-spacing: 0.02em;
  padding: 5px 9px;
  border-radius: 4px;
  white-space: nowrap;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.2s ease;
  z-index: 5;
}
.risk-dot:hover::after { opacity: 1; }
.dot-critical { background: var(--red); box-shadow: 0 0 0 4px rgba(255,68,85,0.15); }
.dot-high     { background: var(--gold); box-shadow: 0 0 0 4px rgba(255,184,0,0.14); }
.dot-medium   { background: var(--teal); box-shadow: 0 0 0 4px rgba(0,212,170,0.14); }

/* ── Side column ── */
.risk-side {
  display: flex;
  flex-direction: column;
  gap: 16px;
}

/* register list */
.risk-register-list {
  list-style: none;
  display: flex;
  flex-direction: column;
  gap: 10px;
}
.risk-register-item {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 9px 10px;
  background: rgba(255,255,255,0.02);
  border: 1px solid rgba(255,255,255,0.05);
  border-radius: 6px;
}
.risk-item-info {
  flex: 1;
  min-width: 0;
}
.risk-item-name {
  font-family: 'Inter', sans-serif;
  font-size: 0.78rem;
  font-weight: 500;
  color: var(--white);
  line-height: 1.3;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.risk-item-category {
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.6rem;
  color: var(--grey);
  letter-spacing: 0.08em;
  text-transform: uppercase;
  margin-top: 2px;
}
.risk-severity {
  font-family: 'Space Grotesk', sans-serif;
  font-size: 0.6rem;
  font-weight: 600;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  padding: 3px 8px;
  border-radius: 4px;
  white-space: nowrap;
  flex-shrink: 0;
}
.sev-critical { color: var(--red); background: rgba(255,68,85,0.12); border: 1px solid rgba(255,68,85,0.25); }
.sev-high     { color: var(--gold); background: rgba(255,184,0,0.1); border: 1px solid rgba(255,184,0,0.22); }

.risk-trend-symbol {
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.85rem;
  font-weight: 500;
  width: 16px;
  text-align: center;
  flex-shrink: 0;
}
.trend-up   { color: var(--red); }
.trend-down { color: var(--teal); }
.trend-flat { color: var(--grey); }

/* trend chart */
.risk-trend-chart svg { display: block; width: 100%; height: auto; }
.risk-trend-line {
  fill: none;
  stroke: var(--teal-bright);
  stroke-width: 2;
  stroke-linecap: round;
  stroke-linejoin: round;
}
.risk-trend-area { fill: url(#riskTrendGradient); }
.risk-trend-point {
  fill: var(--navy);
  stroke: var(--teal-bright);
  stroke-width: 1.5;
}
.risk-trend-labels {
  display: flex;
  justify-content: space-between;
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.6rem;
  color: var(--grey);
  letter-spacing: 0.05em;
  margin-top: 4px;
  padding: 0 2px;
}
.risk-trend-headline {
  font-family: 'Space Grotesk', sans-serif;
  font-size: 0.78rem;
  font-weight: 500;
  color: var(--white);
  margin-top: 10px;
}
.risk-trend-headline span { color: var(--teal-bright); }

/* AI insight panel */
.risk-insight {
  background: rgba(0,212,170,0.04);
  border: 1px solid rgba(255,255,255,0.06);
  border-left: 2px solid var(--teal);
  border-radius: 8px;
  padding: 1rem 1.1rem;
}
.risk-insight-label {
  font-family: 'Space Grotesk', sans-serif;
  font-size: 0.65rem;
  font-weight: 600;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  color: var(--teal);
  margin-bottom: 0.5rem;
}
.risk-insight-text {
  font-family: 'Inter', sans-serif;
  font-size: 0.78rem;
  font-weight: 300;
  color: var(--white);
  line-height: 1.6;
}
.risk-insight-text strong { font-weight: 500; color: var(--teal-bright); }

/* Showcase 3 — Business Risk responsive (900px) */
/* ── Responsive ── */
@media (max-width: 900px) {
  .risk-dashboard { grid-template-columns: 1fr; }
  #scene3-s3 { height: 280vh; }
}

/* ════════════════════════════════
   SCENE 3 — SHOWCASE 4: MARKET INTELLIGENCE
   ID: #scene3-s4-wrapper
   ════════════════════════════════ */
/* ── SHOWCASE 4 — WRAPPER / SECTION / STICKY ── */

#scene3-s4-wrapper {
  position: relative; margin: 0; padding: 0; display: block;
  background: var(--navy);
}
#scene3-s4 {
  position: relative; height: 250vh;
  background: var(--navy); margin: 0; padding: 0;
}
#scene3-s4-sticky {
  position: sticky; top: 0; height: 100vh;
  overflow: hidden; display: flex;
  align-items: center; justify-content: center;
}

#sc-header-4 {
  position: absolute; top: 1.25rem;
  left: 50%; transform: translateX(-50%);
  text-align: center; opacity: 0; z-index: 10;
  width: 92vw; max-width: 700px;
}

/* ══════════════════════════════════════════
   SHOWCASE 4 — MARKET INTELLIGENCE DASHBOARD
   ══════════════════════════════════════════ */

/* Dashboard container — sits below the header */
.mi-dashboard {
  position: absolute;
  top: 0;
  left: 50%;
  transform: translateX(-50%);
  width: 92vw;
  max-width: 1200px;
  padding-top: 10rem;   /* clears the header */
  padding-bottom: 1.5rem;
  display: flex;
  flex-direction: column;
  gap: 12px;
}

/* ── WAVE 1: Metric Tiles ── */

.mi-overview {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 10px;
  flex-shrink: 0;
}

.mi-tile {
  background: rgba(255,255,255,0.03);
  border: 1px solid rgba(255,255,255,0.06);
  border-radius: 8px;
  padding: 14px 16px 12px;
  display: flex;
  flex-direction: column;
  gap: 4px;
  opacity: 0; /* pre-GSAP flash prevention */
}

/* Colour-keyed top border per tile */
.mi-tile--teal { border-top: 2px solid rgba(0,212,170,0.3); }
.mi-tile--blue { border-top: 2px solid rgba(0,102,255,0.3); }
.mi-tile--gold { border-top: 2px solid rgba(255,184,0,0.3); }

.mi-tile-num {
  font-family: 'Space Grotesk', sans-serif;
  font-size: clamp(1.6rem, 2.5vw, 2.2rem);
  font-weight: 700;
  line-height: 1;
  letter-spacing: -0.02em;
  display: flex;
  align-items: baseline;
  gap: 4px;
}

.mi-tile--teal .mi-tile-num { color: var(--teal); }
.mi-tile--blue .mi-tile-num { color: var(--blue); }
.mi-tile--gold .mi-tile-num { color: var(--gold); }

.mi-tile-num-val { display: inline; }

.mi-tile-trend {
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.85rem;
  font-weight: 500;
}
.mi-tile-trend.up   { color: var(--teal); }
.mi-tile-trend.down { color: var(--red);  }

.mi-tile-label {
  font-family: 'Inter', sans-serif;
  font-size: 0.62rem;
  color: var(--grey);
  font-weight: 400;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  margin-top: 3px;
}

/* ── WAVES 2 & 3: Middle row ── */

.mi-middle {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
  height: 200px;
  flex-shrink: 0;
}

/* Shared panel shell */
.mi-panel {
  background: rgba(255,255,255,0.02);
  border: 1px solid rgba(255,255,255,0.06);
  border-radius: 8px;
  padding: 14px 16px;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

.mi-panel-title {
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.6rem;
  color: var(--grey);
  text-transform: uppercase;
  letter-spacing: 0.18em;
  margin-bottom: 10px;
  flex-shrink: 0;
  display: flex;
  align-items: center;
  gap: 6px;
}

.mi-panel-ts {
  margin-left: auto;
  font-size: 0.54rem;
  color: rgba(107,107,123,0.45);
  letter-spacing: 0.06em;
  text-transform: none;
}

/* Pulsing live dot */
.mi-live-dot {
  display: inline-block;
  width: 5px; height: 5px;
  border-radius: 50%;
  background: var(--teal);
  flex-shrink: 0;
  animation: mi-pulse 2s ease-in-out infinite;
}

@keyframes mi-pulse {
  0%, 100% { opacity: 1;    transform: scale(1);   }
  50%       { opacity: 0.2; transform: scale(0.55); }
}

/* ── WAVE 2: Signals Feed ── */

.mi-signals-wrap {
  opacity: 0; /* pre-GSAP */
}

.mi-signals {
  display: flex;
  flex-direction: column;
  flex: 1;
  overflow: hidden;
}

.mi-signal {
  display: grid;
  grid-template-columns: 8px auto 1fr auto auto;
  align-items: center;
  gap: 8px;
  padding: 5px 0;
  border-bottom: 1px solid rgba(255,255,255,0.04);
  flex: 1;
  opacity: 0; /* pre-GSAP */
}
.mi-signal:last-child { border-bottom: none; }

/* Signal status dots */
.mi-signal-dot {
  width: 6px; height: 6px;
  border-radius: 50%;
  flex-shrink: 0;
}
.mi-signal--pos  .mi-signal-dot { background: var(--teal); box-shadow: 0 0 5px rgba(0,212,170,0.5); }
.mi-signal--neg  .mi-signal-dot { background: var(--red);  box-shadow: 0 0 5px rgba(255,68,85,0.5);  }
.mi-signal--neu  .mi-signal-dot { background: var(--gold); box-shadow: 0 0 5px rgba(255,184,0,0.5);  }
.mi-signal--comp .mi-signal-dot { background: var(--gold); box-shadow: 0 0 5px rgba(255,184,0,0.5);  }

/* Sector / competitor tags */
.mi-signal-tag {
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.55rem;
  padding: 2px 5px;
  border-radius: 3px;
  letter-spacing: 0.05em;
  white-space: nowrap;
}
